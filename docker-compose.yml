networks:
  fraud_net:
    driver: bridge

volumes:
  postgres_data:

services:

  # ── 1. Apache Zookeeper ──────────────────────────────────
  zookeeper:
    image: confluentinc/cp-zookeeper:7.3.0
    container_name: zookeeper
    networks:
      - fraud_net
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    healthcheck:
      test: ["CMD", "bash", "-c", "echo ruok | nc localhost 2181"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── 2. Apache Kafka ──────────────────────────────────────
  kafka:
    image: confluentinc/cp-kafka:7.3.0
    container_name: kafka
    networks:
      - fraud_net
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_LOG_RETENTION_HOURS: 168
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 15s
      timeout: 10s
      retries: 10

  # ── 3. PostgreSQL ─────────────────────────────────────────
  postgres:
    image: postgres:15
    container_name: postgres
    networks:
      - fraud_net
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: fraud_user
      POSTGRES_PASSWORD: fraud_pass
      POSTGRES_DB: fraud_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fraud_user -d fraud_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── 4. Kafka Producer ─────────────────────────────────────
  kafka_producer:
    build:
      context: ./kafka_producer
    container_name: kafka_producer
    networks:
      - fraud_net
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      KAFKA_TOPIC: raw-transactions
      CSV_PATH: /data/transactions.csv
      BATCH_SIZE: "1000"
    volumes:
      - ./data:/data:ro
    restart: on-failure

  # ── 5. Kafka Consumer ─────────────────────────────────────
  kafka_consumer:
    build:
      context: ./kafka_consumer
    container_name: kafka_consumer
    networks:
      - fraud_net
    depends_on:
      kafka:
        condition: service_healthy
      postgres:
        condition: service_healthy
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      KAFKA_TOPIC: raw-transactions
      KAFKA_GROUP_ID: fraud-consumer-group
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_NAME: fraud_db
      DB_USER: fraud_user
      DB_PASS: fraud_pass
    restart: on-failure

  # ── 6. Apache Spark ───────────────────────────────────────
  spark:
    image: apache/spark:3.5.0
    container_name: spark
    networks:
      - fraud_net
    depends_on:
      postgres:
        condition: service_healthy
    user: root
    entrypoint: ["/opt/spark/sbin/start-master.sh"]
    environment:
      SPARK_NO_DAEMONIZE: "true"
    volumes:
      - ./spark_jobs:/opt/spark_jobs
    ports:
      - "8082:8080"

  # ── 7. Apache Airflow ─────────────────────────────────────
  airflow:
    image: apache/airflow:2.7.0
    container_name: airflow
    networks:
      - fraud_net
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://fraud_user:fraud_pass@postgres/fraud_db
      AIRFLOW__CORE__FERNET_KEY: "46BKJoQYlPPOexq0OhDZnIlNepKFf87WFwLt0nIe3aI="
      AIRFLOW__CORE__LOAD_EXAMPLES: "False"
      AIRFLOW__WEBSERVER__EXPOSE_CONFIG: "True"
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_NAME: fraud_db
      DB_USER: fraud_user
      DB_PASS: fraud_pass
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./spark_jobs:/opt/spark_jobs
    ports:
      - "8083:8080"
    command: >
      bash -c "airflow db init &&
               airflow users create --username admin --password admin
                 --firstname Admin --lastname User --role Admin --email admin@example.com &&
               airflow scheduler &
               airflow webserver"
    restart: on-failure

  # ── 8. FastAPI ────────────────────────────────────────────
  fastapi_app:
    build:
      context: ./fastapi_app
    container_name: fastapi_app
    networks:
      - fraud_net
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_NAME: fraud_db
      DB_USER: fraud_user
      DB_PASS: fraud_pass
    ports:
      - "8000:8000"
    restart: on-failure
